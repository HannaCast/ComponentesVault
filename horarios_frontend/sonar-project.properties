sonar.projectKey=frontend-horarios
sonar.projectName=frontend-horarios
sonar.projectVersion=1.0

# Código fuente React
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Analizar solo archivos JS/JSX/TS/TSX
sonar.inclusions=**/*.js,**/*.jsx, **/*.css

# Excluir lo que no importa
sonar.exclusions=**/node_modules/**,**/build/**,**/dist/**,**/*.test.js,**/*.test.jsx,**/*.test.ts,**/*.test.tsx,**/coverage/**, **/public/**

# Tests
sonar.tests=src
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.test.ts,**/*.spec.js,**/*.spec.jsx